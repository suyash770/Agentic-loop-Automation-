version: '3.8'

services:
  nexus-engine:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      # If using MongoDB Atlas, uncomment and paste your URI below:
      # - MONGODB_URI=mongodb+srv://<user>:<pass>@cluster.mongodb.net/nexus
    restart: unless-stopped
